schema: spec-driven

context: |
  Tech stack: C# .NET 10.0, WPF + Windows Forms, SQLite (Microsoft.Data.Sqlite)
  Architecture: Basic WPF MVVM pattern with code-behind, Database helper pattern
  Libraries: Microsoft.Extensions.Configuration, Microsoft.Extensions.Configuration.Json
  Testing: Not detected
  Style: Standard C# conventions, nullable reference types enabled

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/classes
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include class diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Use C# 12+ features where appropriate
  verify:
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
